<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a72"/>
      <stop offset="100%" stop-color="#009ffd"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="url(#bgGrad)" rx="30" ry="30"/>
  
  <!-- Left Lens -->
  <rect x="35" y="80" width="55" height="40" rx="10" ry="10" fill="none" stroke="#ffffff" stroke-width="8"/>
  <!-- Right Lens -->
  <rect x="110" y="80" width="55" height="40" rx="10" ry="10" fill="none" stroke="#ffffff" stroke-width="8"/>
  <!-- Bridge -->
  <line x1="90" y1="95" x2="110" y2="95" stroke="#ffffff" stroke-width="8"/>
  <!-- Arms -->
  <line x1="20" y1="85" x2="35" y2="85" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <line x1="180" y1="85" x2="165" y2="85" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Cool glare -->
  <line x1="45" y1="90" x2="60" y2="110" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="90" x2="135" y2="110" stroke="rgba(255,255,255,0.4)" stroke-width="4" stroke-linecap="round"/>
  
  <!-- Smile -->
  <path d="M 80 140 Q 100 160 120 140" fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
</svg>
